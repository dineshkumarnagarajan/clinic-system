version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: clinic-mongodb-dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data_dev:/data/db

  backend:
    image: node:18-alpine
    container_name: clinic-backend-dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/clinic_system?authSource=admin
      JWT_SECRET: your-secret-key-dev
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
    command: sh -c "npm install -g pnpm && pnpm install && cd packages/backend && pnpm run dev"

  frontend:
    image: node:18-alpine
    container_name: clinic-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    command: sh -c "npm install -g pnpm && pnpm install && cd packages/frontend && pnpm run dev"

volumes:
  mongodb_data_dev:
